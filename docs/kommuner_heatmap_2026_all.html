        const size = 3 + Math.max(2, intensity) * 10;
        const hue = 240 - 240 * intensity;
        const color = `hsl(${hue}, 90%, 42%)`;
        const marker = L.circleMarker([p.lat, p.lon], {
          radius: size,
          color,
          fillColor: color,
          fillOpacity: 0.38,
          weight: 1,
          opacity: 0.8

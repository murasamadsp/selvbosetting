site_name: Гайд із самозаселення (Avtalt Selvbosetting)
site_description: Інструкція, шаблони та чек-листи для оренди житла в Норвегії з гарантією NAV

theme:
  name: material
  language: uk
  font:
    text: Inter
    code: Fira Code
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Перемкнути на темну тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Перемкнути на світлу тему
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Головна: index.md
  - З чого почати: 00_ПОЧНИ_ТУТ.md
  - Покроковий Гайд:
    - Інструкція: 02_Покроковий_Гайд/Інструкція.md
  - Закони та Права:
    - Юридичне обґрунтування: 01_Закони_та_Права/Юридичне_обґрунтування.md
  - Шаблони Листів:
    - Орендодавцю: 03_Шаблони_Листів/Орендодавцю.md
    - Профіль учасника: 03_Шаблони_Листів/Профіль_Звукорежисера_Бізнес.md
  - Комуни та Контакти:
    - Осло: 04_Комуни_та_Контакти/Осло.md
    - Ліллестрьом: 04_Комуни_та_Контакти/Ліллестрьом.md
    - Нордре Фолло: 04_Комуни_та_Контакти/Нордре_Фолло.md
  - Фінанси та NAV:
    - Виплати та Гарантії: 05_Фінанси_та_NAV/Виплати_та_Гарантії.md
    - Як саме платять: 05_Фінанси_та_NAV/Як_саме_платять.md
  - Чек-листи:
    - Виїзд із центру: 06_Чек-листи/Виїзд_із_центру.md
    - Дистанційна перевірка: 06_Чек-листи/Дистанційна_перевірка.md
    - Приймання квартири: 06_Чек-листи/Приймання_квартири.md
  - Побут та Облаштування: 07_Побут_та_Облаштування.md
  - FAQ та Проблеми:
    - Часті питання: 08_FAQ/FAQ.md
    - Якщо відмовили: 08_FAQ/Якщо_відмовили.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

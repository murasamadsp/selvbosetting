site_name: Гайд із самозаселення (Avtalt Selvbosetting)
site_description: Інструкція, шаблони та чек-листи для оренди житла в Норвегії з гарантією NAV

theme:
  name: material
  language: uk
  font:
    text: Inter
    code: Fira Code
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Перемкнути на темну тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Перемкнути на світлу тему
  features:
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Головна: index.md
  - З чого почати: start.md
  - Покроковий Гайд: guide/index.md
  - Закони та Права: laws/index.md
  - Шаблони:
    - Листи орендодавцю: templates/landlord.md
    - Профіль учасника: templates/profile.md
  - Комуни:
    - Осло: communes/oslo.md
    - Ліллестрьом: communes/lillestrom.md
    - Нордре Фолло: communes/nordre-follo.md
  - Фінанси та NAV:
    - Виплати та Гарантії: finances/payments.md
    - Як саме платять: finances/how-payments-work.md
    - Банківський рахунок: finances/bank-account.md
    - Програма інтеграції: finances/program.md
  - Чек-листи:
    - Дистанційна перевірка: checklists/remote-check.md
    - Виїзд із центру: checklists/leaving-mottak.md
    - Приймання квартири: checklists/move-in.md
  - Побут: daily.md
  - Глосарій: glossary.md
  - FAQ:
    - Часті питання: faq/index.md
    - Якщо відмовили: faq/if-rejected.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
